<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213E"/>
      <stop offset="100%" style="stop-color:#0F3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C518"/>
      <stop offset="100%" style="stop-color:#C9A000"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="150" cy="150" r="148"/>
    </clipPath>
  </defs>

  <!-- Fondo -->
  <circle cx="150" cy="150" r="150" fill="url(#bg)"/>
  
  <!-- Borde dorado -->
  <circle cx="150" cy="150" r="147" fill="none" stroke="url(#gold)" stroke-width="5"/>
  
  <!-- Cuerpo/silueta (hábito religioso) -->
  <!-- Hábito blanco -->
  <ellipse cx="150" cy="310" rx="90" ry="60" fill="#F0F0F0" clip-path="url(#circle)"/>
  <rect x="80" y="220" width="140" height="100" fill="#F0F0F0" clip-path="url(#circle)"/>
  
  <!-- Velo/toca negra -->
  <ellipse cx="150" cy="165" rx="75" ry="85" fill="#1A1A1A" clip-path="url(#circle)"/>
  
  <!-- Toca blanca interior -->
  <ellipse cx="150" cy="168" rx="58" ry="70" fill="#FFFFFF" clip-path="url(#circle)"/>
  
  <!-- Cara -->
  <ellipse cx="150" cy="162" rx="42" ry="50" fill="#F5CBA7"/>
  
  <!-- Rasgos faciales sutiles -->
  <!-- Ojos -->
  <ellipse cx="135" cy="155" rx="5" ry="5.5" fill="#4A3728"/>
  <ellipse cx="165" cy="155" rx="5" ry="5.5" fill="#4A3728"/>
  <circle cx="136" cy="153" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="166" cy="153" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  
  <!-- Cejas -->
  <path d="M128 147 Q135 144 142 147" stroke="#6B4F3A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M158 147 Q165 144 172 147" stroke="#6B4F3A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  
  <!-- Nariz -->
  <path d="M150 160 Q147 168 143 172 Q150 175 157 172 Q153 168 150 160Z" fill="#E8A882" opacity="0.5"/>
  
  <!-- Boca (sonrisa suave) -->
  <path d="M140 180 Q150 187 160 180" stroke="#C47A5A" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Cruz en el hábito -->
  <rect x="143" y="230" width="14" height="40" rx="3" fill="url(#gold)" opacity="0.8"/>
  <rect x="134" y="243" width="32" height="10" rx="3" fill="url(#gold)" opacity="0.8"/>
  
  <!-- Texto -->
  <rect x="0" y="260" width="300" height="40" fill="rgba(0,0,0,0.55)" clip-path="url(#circle)"/>
  <text x="150" y="278" font-family="Georgia,serif" font-size="10" font-weight="bold"
        fill="#FFE066" text-anchor="middle">Sor Cesarina A. Paulino</text>
  <text x="150" y="292" font-family="Georgia,serif" font-size="9"
        fill="#F5C518" text-anchor="middle">Directora Docente</text>
</svg>
